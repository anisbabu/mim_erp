server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/merry_erp}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:sys123}
  jpa:
    hibernate:
      ddl-auto: validate          # schema owned by Flyway, JPA only validates
    properties:
      hibernate.format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# CORS for the Next.js dev server / Flutter app
mim:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  jwt:
    # HS256 needs a secret of at least 32 bytes. Override in production.
    secret: ${JWT_SECRET:mim-erp-dev-secret-key-change-me-in-production-0123456789}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:480}
  bootstrap:
    # initial admin created on first run if no admin exists
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin123}
